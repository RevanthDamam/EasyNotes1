version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: easynotes_user
      POSTGRES_PASSWORD: easynotes_password
      POSTGRES_DB: easynotes_db
    ports:
      - '5432:5432'
    volumes:
      - easynotes_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  easynotes_data:
